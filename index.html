window.adminAuth=async(e)=>{e.preventDefault();

    email:document.getElementById('adm-u').value.trim(),
    password:document.getElementById('adm-p').value
  });

  navigateTo('admin-dashboard');
};
async function fetchOrders(){const {data}=await supa.from('orders').select('*').order('created_at',{ascending:false});state.orders=data||[];if(state.view==='admin-dashboard')render();}
async function updateStatus(ref,status){await supa.from('orders').update({Status:status}).eq('ref',ref);fetchOrders();}
function cancelActiveProcess(){document.getElementById('admin-actions-bar').style.display='none';}
function selectPlan(bundle){state.activeOrderData={bundle};navigateTo('confirm-phone');}
async function handleOrderButton(){
  const phone=document.getElementById('p-num').value;
  if(!phone)return alert("Enter valid phone number");
  state.activeOrderData.phone=phone;
  if(state.isAdmin && state.isDirectMode){processDirectOrder();}
  else{
    const email=document.getElementById('cust-email').value;
    if(!email)return alert("Enter your email address for payment receipt");
    state.activeOrderData.email=email;
    startPaystack();
  }
}
function startPaystack(){
  const {bundle,email}=state.activeOrderData;
  const handler=PaystackPop.setup({
    key:PAYSTACK_KEY,email:email,amount:Math.round(bundle.price*100),currency:'GHS',
    callback:(res)=>onPaymentSuccess(res),onClose:()=>console.log('Window closed')
  });
  handler.openIframe();
}
async function onPaymentSuccess(response){
  const {bundle,phone,email}=state.activeOrderData;
  await supa.from('orders').insert([{ref:response.reference,Phone:phone,Network:bundle.network,bundle_name:bundle.size,Amount:bundle.price,Status:'Pending'}]);
  navigateTo('success',{bundle_name:bundle.size,Phone:phone});
}
async function processDirectOrder(){
  const {bundle,phone}=state.activeOrderData;
  const ref='DIR-'+Math.random().toString(36).slice(2,10).toUpperCase();
  await supa.from('orders').insert([{ref:ref,Phone:phone,Network:bundle.network,bundle_name:bundle.size,Amount:bundle.price,Status:'Processing'}]);
  window.open('https://evnetwork.shop','_blank');
  state.isDirectMode=false;
  fetchOrders();
  navigateTo('admin-dashboard');
}
function openProcessTab(order){
  window.open('https://evnetwork.shop','_blank');
  updateStatus(order.ref,'Processing');
  document.getElementById('active-order-label').innerText=order.Phone;
  document.getElementById('admin-actions-bar').style.display='flex';
  document.getElementById('global-fulfill-btn').onclick=async()=>{
    await updateStatus(order.ref,'Completed');
    cancelActiveProcess();
  };
}

function renderConfirmPhone(){
  const {bundle}=state.activeOrderData;
  return `<div class="max-w-xl mx-auto py-24 px-4 animate__animated animate__fadeInUp"><div class="card-theme p-10 rounded-[3rem] shadow-2xl text-center"><h2 class="text-3xl font-black mb-4">Finalize Order</h2><p class="mb-8 font-bold text-slate-400 uppercase tracking-widest text-xs">${bundle.network} • ${bundle.size}</p><input id="p-num" type="tel" placeholder="Phone (024XXXXXXX)" class="w-full p-6 border-4 dark:bg-slate-800 dark:border-slate-700 rounded-[2rem] text-center text-3xl font-black mb-4 focus:border-blue-600 outline-none">${!state.isDirectMode?'<input id="cust-email" type="email" placeholder="Email address" class="w-full p-4 border rounded-xl mb-6 font-bold dark:bg-slate-800">':''}<button onclick="handleOrderButton()" class="w-full ${state.isDirectMode?'bg-blue-600':'bg-slate-900'} text-white py-6 rounded-[2rem] font-black text-xl shadow-xl uppercase">${state.isDirectMode?'Direct Save':'Pay Now'}</button><button onclick="navigateTo('home')" class="mt-6 text-slate-400 font-bold block w-full">Cancel</button></div></div>`;
}
function renderAdminDashboard(){
  const stats=state.orders.reduce((acc,o)=>{
    const amt=parseFloat(o.Amount||0); acc.total+=amt;
    if(o.Network==='mtn')acc.mtn+=amt;if(o.Network==='airteltigo')acc.art+=amt;if(o.Network==='telecel')acc.tel+=amt;
    return acc;
  },{total:0,mtn:0,art:0,tel:0});
  let filtered=state.orders.filter(o=>o.Phone.includes(state.searchQuery));
  if(state.networkFilter!=='all') filtered=filtered.filter(o=>o.Network===state.networkFilter);
  return `<div class="min-h-screen p-6"><div class="max-w-7xl mx-auto py-10"><div class="flex justify-between items-center mb-10"><h2 class="text-4xl font-black">Admin</h2><button onclick="state.isDirectMode = true; navigateTo('home')" class="bg-blue-600 px-6 py-2 rounded-xl font-black text-xs text-white uppercase tracking-widest">+ Direct Order</button></div><div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-slate-900"><div class="bg-white p-6 rounded-3xl border"><p class="text-[10px] font-black uppercase opacity-50">Total</p><h3 class="text-2xl font-black">₵${stats.total.toFixed(2)}</h3></div><div class="bg-[#FFCC00] p-6 rounded-3xl"><p class="text-[10px] font-black uppercase opacity-60">MTN</p><h3 class="text-2xl font-black">₵${stats.mtn.toFixed(2)}</h3></div><div class="bg-blue-100 p-6 rounded-3xl"><p class="text-[10px] font-black uppercase opacity-60">Airtel</p><h3 class="text-2xl font-black">₵${stats.art.toFixed(2)}</h3></div><div class="bg-red-100 p-6 rounded-3xl"><p class="text-[10px] font-black uppercase opacity-60">Telecel</p><h3 class="text-2xl font-black">₵${stats.tel.toFixed(2)}</h3></div></div><div class="bg-white text-black rounded-[2rem] shadow overflow-hidden border"><div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b"><tr><th class="p-6">Time</th><th class="p-6">Customer</th><th class="p-6">Status</th><th class="p-6 text-right">Action</th></tr></thead><tbody>${filtered.map(o => `<tr class="border-b hover:bg-slate-50"><td class="p-6 text-xs">${new Date(o.created_at).toLocaleString()}</td><td class="p-6 font-black text-blue-600">${o.Phone} <br/><span class="text-[9px] text-slate-400 font-normal">${o.Network} • ${o.bundle_name}</span></td><td class="p-6"><span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${o.Status === 'Completed' ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'}">${o.Status}</span></td><td class="p-6 text-right space-x-2">${o.Status === 'Pending' ? `<button onclick='openProcessTab(${JSON.stringify(o)})' class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black">PROCESS</button>` : `<button onclick="updateStatus('${o.ref}','Completed')" class="text-green-600 font-bold text-[10px]">CONFIRM</button>`}<button onclick="if(confirm('Delete?')) supa.from('orders').delete().eq('ref','${o.ref}').then(()=>fetchOrders())" class="text-red-600 font-black text-[10px]">DEL</button></td></tr>`).join('')}</tbody></table></div></div></div></div>`;
}

render();
</script>
</body>
</html>
